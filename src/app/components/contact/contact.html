<section class="contact-section" id="contact">
  <div class="contact-glow"></div>
  
  <div class="contact-container" [@fadeInUp]>
    <div class="contact-info">
      <span class="sub-header">// 03. GET IN TOUCH</span>
      <h2 class="contact-title">Let's start a <br><span class="electric-text">Conversation.</span></h2>
      <p class="contact-desc">Ready to turn your ideas into high-performance reality? Drop a message or find me on my socials.</p>
      
      <div class="contact-details">
        <div class="detail-item">
          <span class="label">Email</span>
          <a href="mailto:Sanjeev50727@gmail.com" class="value">Sanjeev50727@gmail.com</a>
        </div>
        <div class="detail-item">
          <span class="label">Location</span>
          <p class="value">Chandausi, Uttar Pradesh, India</p>
        </div>
      </div>
    </div>

    <div class="contact-form-wrapper">
      <form class="main-form">
        <div class="input-field">
          <input type="text" id="name" required placeholder=" ">
          <label for="name">Your Full Name</label>
        </div>
        <div class="input-field">
          <input type="email" id="email" required placeholder=" ">
          <label for="email">Email Address</label>
        </div>
        <div class="input-field">
          <textarea id="message" rows="4" required placeholder=" "></textarea>
          <label for="message">How can I help you?</label>
        </div>
        
        <button type="submit" class="thunder-btn">
          SEND MESSAGE
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
    </div>
  </div>
</section>
